<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股小市值股票筛选系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: white;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 200px;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .table-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-header h2 {
            font-size: 1.3em;
        }
        
        .last-update {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #f8f9fa;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e9ecef;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            color: #333;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .stock-name {
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .stock-name:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .positive {
            color: #28a745;
            font-weight: 600;
        }
        
        .negative {
            color: #dc3545;
            font-weight: 600;
        }
        
        .neutral {
            color: #6c757d;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }
        
        .tag-high {
            background: #d4edda;
            color: #155724;
        }
        
        .tag-medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .tag-low {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            margin: 3% auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 1.5em;
        }
        
        .close {
            color: white;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .close:hover {
            opacity: 0.7;
        }
        
        .modal-body {
            padding: 30px;
            max-height: calc(90vh - 140px);
            overflow-y: auto;
        }
        
        .chart-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }
        
        .chart-tab {
            padding: 10px 25px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .chart-tab:hover {
            background: #f8f9fa;
            color: #667eea;
        }
        
        .chart-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        #klineChart {
            width: 100%;
            height: 500px;
        }
        
        .stock-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .info-card h4 {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .info-card .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 0.85em;
            }
            
            .modal-content {
                width: 95%;
                margin: 5% auto;
            }
            
            #klineChart {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 A股小市值股票筛选系统</h1>
            <p>市值倒数1000名中，归母净利润增速前30</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <h3>筛选股票数</h3>
                <div class="value" id="stockCount">-</div>
            </div>
            <div class="stat-card">
                <h3>平均市值</h3>
                <div class="value" id="avgCap">-</div>
            </div>
            <div class="stat-card">
                <h3>平均增速</h3>
                <div class="value" id="avgGrowth">-</div>
            </div>
        </div>
        
        <div style="text-align: center;">
            <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                🔄 立即刷新数据
            </button>
        </div>
        
        <div class="table-container">
            <div class="table-header">
                <h2>📈 筛选结果列表</h2>
                <span class="last-update" id="lastUpdate">更新时间: -</span>
            </div>
            <div id="tableContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载数据...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- K线图表Modal -->
    <div id="chartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">股票详情</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="chart-tabs">
                    <button class="chart-tab active" onclick="switchPeriod('daily')">日线</button>
                    <button class="chart-tab" onclick="switchPeriod('weekly')">周线</button>
                    <button class="chart-tab" onclick="switchPeriod('monthly')">月线</button>
                </div>
                <div id="klineChart"></div>
                <div class="stock-info-grid" id="stockInfoGrid">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStock = null;
        let currentPeriod = 'daily';
        let klineChart = null;
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/stocks');
                const data = await response.json();
                
                if (data.success) {
                    renderTable(data.stocks);
                    updateStats(data.stocks);
                    document.getElementById('lastUpdate').textContent = 
                        '更新时间: ' + new Date(data.timestamp).toLocaleString('zh-CN');
                } else {
                    showError(data.error || '加载数据失败');
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }
        
        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 正在刷新...';
            
            try {
                const response = await fetch('/api/refresh', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    renderTable(data.stocks);
                    updateStats(data.stocks);
                    document.getElementById('lastUpdate').textContent = 
                        '更新时间: ' + new Date(data.timestamp).toLocaleString('zh-CN');
                    alert('✅ 数据刷新成功！');
                } else {
                    alert('❌ 刷新失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 立即刷新数据';
            }
        }
        
        // 渲染表格
        function renderTable(stocks) {
            const tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>代码</th>
                            <th>名称</th>
                            <th>最新价</th>
                            <th>涨跌幅</th>
                            <th>总市值(亿)</th>
                            <th>流通市值(亿)</th>
                            <th>净利润增速</th>
                            <th>成交额(万)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stocks.map((stock, index) => {
                            const changeClass = stock['涨跌幅'] > 0 ? 'positive' : stock['涨跌幅'] < 0 ? 'negative' : 'neutral';
                            const growthClass = stock['净利润同比增长率'] > 0 ? 'positive' : stock['净利润同比增长率'] < 0 ? 'negative' : 'neutral';
                            const totalCap = (stock['总市值'] / 100000000).toFixed(2);
                            const floatCap = (stock['流通市值'] / 100000000).toFixed(2);
                            const turnover = (stock['成交额'] / 10000).toFixed(2);
                            
                            return `
                                <tr>
                                    <td><span class="tag ${index < 3 ? 'tag-high' : index < 10 ? 'tag-medium' : 'tag-low'}">${index + 1}</span></td>
                                    <td>${stock['代码']}</td>
                                    <td><span class="stock-name" onclick="openChart('${stock['代码']}', '${stock['名称']}')">${stock['名称']}</span></td>
                                    <td>${stock['最新价'] ? stock['最新价'].toFixed(2) : '-'}</td>
                                    <td class="${changeClass}">${stock['涨跌幅'] ? stock['涨跌幅'].toFixed(2) + '%' : '-'}</td>
                                    <td>${totalCap}</td>
                                    <td>${floatCap}</td>
                                    <td class="${growthClass}">${stock['净利润同比增长率'] ? stock['净利润同比增长率'].toFixed(2) + '%' : '-'}</td>
                                    <td>${turnover}</td>
                                    <td><button class="refresh-btn" style="padding: 8px 16px; font-size: 0.85em;" onclick="openChart('${stock['代码']}', '${stock['名称']}')">查看K线</button></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('tableContent').innerHTML = tableHtml;
        }
        
        // 更新统计数据
        function updateStats(stocks) {
            document.getElementById('stockCount').textContent = stocks.length;
            
            const avgCap = stocks.reduce((sum, s) => sum + (s['总市值'] || 0), 0) / stocks.length / 100000000;
            document.getElementById('avgCap').textContent = avgCap.toFixed(2) + '亿';
            
            const avgGrowth = stocks.reduce((sum, s) => sum + (s['净利润同比增长率'] || 0), 0) / stocks.length;
            document.getElementById('avgGrowth').textContent = avgGrowth.toFixed(2) + '%';
        }
        
        // 显示错误
        function showError(message) {
            document.getElementById('tableContent').innerHTML = 
                `<div class="error-message">${message}</div>`;
        }
        
        // 打开K线图表Modal
        async function openChart(code, name) {
            currentStock = { code, name };
            currentPeriod = 'daily';
            
            document.getElementById('modalTitle').textContent = `${name} (${code}) - K线图`;
            document.getElementById('chartModal').style.display = 'block';
            
            // 初始化图表
            if (klineChart) {
                klineChart.dispose();
            }
            klineChart = echarts.init(document.getElementById('klineChart'));
            
            // 加载K线数据
            await loadKlineData(code, 'daily');
            
            // 加载股票详细信息
            await loadStockInfo(code);
        }
        
        // 切换周期
        async function switchPeriod(period) {
            currentPeriod = period;
            
            // 更新按钮状态
            document.querySelectorAll('.chart-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新加载数据
            if (currentStock) {
                await loadKlineData(currentStock.code, period);
            }
        }
        
        // 加载K线数据
        async function loadKlineData(code, period) {
            klineChart.showLoading({
                text: '加载中...',
                color: '#667eea',
                textColor: '#667eea',
                maskColor: 'rgba(255, 255, 255, 0.8)'
            });
            
            try {
                const response = await fetch(`/api/kline/${code}?period=${period}`);
                const data = await response.json();
                
                if (data.success && data.data.length > 0) {
                    renderKlineChart(data.data, period);
                } else {
                    klineChart.hideLoading();
                    klineChart.setOption({
                        title: {
                            text: '暂无数据',
                            left: 'center',
                            top: 'center'
                        }
                    });
                }
            } catch (error) {
                klineChart.hideLoading();
                console.error('加载K线数据失败:', error);
            }
        }
        
        // 渲染K线图
        function renderKlineChart(data, period) {
            const dates = data.map(item => item.date);
            const values = data.map(item => [item.open, item.close, item.low, item.high]);
            const volumes = data.map(item => item.volume);
            
            const option = {
                backgroundColor: '#fff',
                animation: true,
                legend: {
                    data: ['K线', 'MA5', 'MA10', 'MA20'],
                    top: 10
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    backgroundColor: 'rgba(255, 255, 255, 0.9)',
                    borderColor: '#ccc',
                    borderWidth: 1,
                    textStyle: {
                        color: '#333'
                    }
                },
                grid: [
                    {
                        left: '5%',
                        right: '5%',
                        top: '15%',
                        height: '55%'
                    },
                    {
                        left: '5%',
                        right: '5%',
                        top: '75%',
                        height: '15%'
                    }
                ],
                xAxis: [
                    {
                        type: 'category',
                        data: dates,
                        scale: true,
                        boundaryGap: false,
                        axisLine: { onZero: false },
                        splitLine: { show: false },
                        min: 'dataMin',
                        max: 'dataMax'
                    },
                    {
                        type: 'category',
                        gridIndex: 1,
                        data: dates,
                        scale: true,
                        boundaryGap: false,
                        axisLine: { onZero: false },
                        axisTick: { show: false },
                        splitLine: { show: false },
                        axisLabel: { show: false },
                        min: 'dataMin',
                        max: 'dataMax'
                    }
                ],
                yAxis: [
                    {
                        scale: true,
                        splitArea: {
                            show: true
                        }
                    },
                    {
                        scale: true,
                        gridIndex: 1,
                        splitNumber: 2,
                        axisLabel: { show: false },
                        axisLine: { show: false },
                        axisTick: { show: false },
                        splitLine: { show: false }
                    }
                ],
                dataZoom: [
                    {
                        type: 'inside',
                        xAxisIndex: [0, 1],
                        start: 50,
                        end: 100
                    },
                    {
                        show: true,
                        xAxisIndex: [0, 1],
                        type: 'slider',
                        top: '92%',
                        start: 50,
                        end: 100
                    }
                ],
                series: [
                    {
                        name: 'K线',
                        type: 'candlestick',
                        data: values,
                        itemStyle: {
                            color: '#ef232a',
                            color0: '#14b143',
                            borderColor: '#ef232a',
                            borderColor0: '#14b143'
                        }
                    },
                    {
                        name: 'MA5',
                        type: 'line',
                        data: calculateMA(5, values),
                        smooth: true,
                        lineStyle: {
                            opacity: 0.8,
                            width: 1
                        }
                    },
                    {
                        name: 'MA10',
                        type: 'line',
                        data: calculateMA(10, values),
                        smooth: true,
                        lineStyle: {
                            opacity: 0.8,
                            width: 1
                        }
                    },
                    {
                        name: 'MA20',
                        type: 'line',
                        data: calculateMA(20, values),
                        smooth: true,
                        lineStyle: {
                            opacity: 0.8,
                            width: 1
                        }
                    },
                    {
                        name: '成交量',
                        type: 'bar',
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        data: volumes,
                        itemStyle: {
                            color: function(params) {
                                const close = values[params.dataIndex][1];
                                const open = values[params.dataIndex][0];
                                return close > open ? '#ef232a' : '#14b143';
                            }
                        }
                    }
                ]
            };
            
            klineChart.hideLoading();
            klineChart.setOption(option);
            
            // 响应式
            window.addEventListener('resize', () => {
                klineChart.resize();
            });
        }
        
        // 计算移动平均线
        function calculateMA(dayCount, data) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < dayCount - 1) {
                    result.push('-');
                    continue;
                }
                let sum = 0;
                for (let j = 0; j < dayCount; j++) {
                    sum += data[i - j][1];  // 收盘价
                }
                result.push((sum / dayCount).toFixed(2));
            }
            return result;
        }
        
        // 加载股票详细信息
        async function loadStockInfo(code) {
            try {
                const response = await fetch(`/api/stock/${code}`);
                const data = await response.json();
                
                if (data.success) {
                    const stock = data.data;
                    const infoHtml = `
                        <div class="info-card">
                            <h4>最新价</h4>
                            <div class="value">${stock['最新价'] ? stock['最新价'].toFixed(2) : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>涨跌幅</h4>
                            <div class="value" style="color: ${stock['涨跌幅'] > 0 ? '#28a745' : stock['涨跌幅'] < 0 ? '#dc3545' : '#666'}">${stock['涨跌幅'] ? stock['涨跌幅'].toFixed(2) + '%' : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>总市值</h4>
                            <div class="value">${stock['总市值'] ? (stock['总市值'] / 100000000).toFixed(2) + '亿' : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>流通市值</h4>
                            <div class="value">${stock['流通市值'] ? (stock['流通市值'] / 100000000).toFixed(2) + '亿' : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>成交量</h4>
                            <div class="value">${stock['成交量'] ? (stock['成交量'] / 10000).toFixed(2) + '万手' : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>成交额</h4>
                            <div class="value">${stock['成交额'] ? (stock['成交额'] / 10000).toFixed(2) + '万' : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>最高价</h4>
                            <div class="value">${stock['最高'] ? stock['最高'].toFixed(2) : '-'}</div>
                        </div>
                        <div class="info-card">
                            <h4>最低价</h4>
                            <div class="value">${stock['最低'] ? stock['最低'].toFixed(2) : '-'}</div>
                        </div>
                    `;
                    document.getElementById('stockInfoGrid').innerHTML = infoHtml;
                }
            } catch (error) {
                console.error('加载股票信息失败:', error);
            }
        }
        
        // 关闭Modal
        function closeModal() {
            document.getElementById('chartModal').style.display = 'none';
            if (klineChart) {
                klineChart.dispose();
                klineChart = null;
            }
        }
        
        // 点击Modal外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('chartModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
