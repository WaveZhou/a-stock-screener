name: Daily Stock Screening

on:
  schedule:
    - cron: '5 7 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动执行股票筛选'

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run stock screening
      run: python run_screening.py

    - name: Copy data to api directory
      run: |
        cp screening_result.json api/screening_result.json || true
        cp data/latest_screening_result.json api/latest_screening_result.json || true

    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ screening_result.json api/screening_result.json api/latest_screening_result.json || true
        git diff --staged --quiet || git commit -m "更新股票筛选结果 - $(date +'%Y-%m-%d %H:%M:%S')"
        git push
