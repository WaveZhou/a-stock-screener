name: Daily Stock Screening

on:
  schedule:
    # 每天14:30执行 (UTC时间6:30，对应北京时间14:30)
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动执行股票筛选'

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run stock screening
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        echo "开始执行股票筛选..."
        python scheduler.py --run-now
        
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: screening-results
        path: |
          data/latest_screening_result.csv
          data/latest_screening_result.json
        retention-days: 30
        
    - name: Commit results to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "📊 自动更新股票筛选结果 - $(date +'%Y-%m-%d %H:%M:%S')"
        
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
        
    - name: Notify on success
      if: success()
      run: |
        echo "✅ 股票筛选任务执行成功！"
        echo "筛选结果已保存并发送至邮箱"
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ 股票筛选任务执行失败"
        echo "请检查日志排查问题"